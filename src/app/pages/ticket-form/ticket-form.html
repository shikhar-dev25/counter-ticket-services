<div class="ticket-form-container">
  <div class="form-section">
    <h2 class="form-title">{{ translate.translate('pageTitle') }}</h2>
    <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()">
    <div class="form-border">
      <div class="form-group">
        <label>{{translate.translate('transactionType')}}</label>
        <select formControlName="transactionType" style="cursor: pointer" class="form-control">
          <option value="Cancellation">{{translate.translate('cancellation')}}</option>
          <option value="BoardingChange">{{translate.translate('boardingChange')}}</option>
        </select>
      </div>

      <div class="form-group">
        <label>{{translate.translate('pnrNumber')}}</label>
        <input
          type="text"
          formControlName="pnrNumber"
          maxlength="10"

          pattern="[0-9]*"
          inputmode="numeric"
          class="form-control"
          placeholder="{{translate.translate('enterPnr')}}"
        />
      </div>

      <div class="form-group">
        <label>{{translate.translate('trainNumber')}}</label>
        <input
          type="text"
          formControlName="trainNumber"
          maxlength="5"
          pattern="[0-9]*"
          inputmode="numeric"
          class="form-control"
          placeholder="{{translate.translate('enterTrain')}}"
        />
      </div>

      <div class="form-group">
        <label>{{translate.translate('captcha')}}</label>
        <input formControlName="captcha" type="text" class="form-control" placeholder="{{translate.translate('enterCaptcha')}}" />
      </div>
      <div class="captcha-container">
        <div class="captcha-box">{{captchaText}}</div>
        <button (click)="refreshCaptcha()" style="cursor: pointer">
          <img src="assets/refresh.png" alt="" />
        </button>
      </div>

      <div class="checkbox-group">
        <input formControlName="isChecked" style="cursor: pointer" type="checkbox" id="terms" />
        <label  for="terms" style="cursor: pointer">
          {{translate.translate('terms')}} </label
        >
        <a href="#procedure-section" style="color: #4456cb; text-decoration: underline"> click to read </a>
      </div>

      <div class="form-buttons">
        <button type="submit"

        [disabled]="ticketForm.invalid || !ticketForm.value.isChecked"
        class="btn-submit">
        {{translate.translate('submit')}}
      </button>
        <button (click)="onReset()" class="btn-reset">{{translate.translate('reset')}}</button>
      </div>
    </div>
    </form>
  </div>

  <div class="sample-ticket">
    <h2 class="form-title">Sample Ticket</h2>
    <img src="assets/sample-ticket.png" alt="Sample Ticket" />
  </div>
</div>
