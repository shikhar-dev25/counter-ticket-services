<div class="ticket-form-container">
  <div class="form-section">
    <h2 class="form-title">Counter Ticket Cancellation/Boarding Point Change</h2>
    <div class="form-border">
      <div class="form-group">
        <label>Transaction Type</label>
        <select style="cursor: pointer" class="form-control">
          <option>Cancellation</option>
          <option>Boarding Point Change</option>
        </select>
      </div>

      <div class="form-group">
        <label>PNR Number</label>
        <input 
          type="text"
          [(ngModel)]="pnrNumber"
          maxlength="10"
          pattern="[0-9]*" 
          inputmode="numeric" 
          class="form-control" 
          placeholder="Enter PNR Number" 
        />
      </div>

      <div class="form-group">
        <label>Train Number</label>
        <input 
          type="text"
          [(ngModel)]="trainNumber" 
          maxlength="5"
          pattern="[0-9]*" 
          inputmode="numeric" 
          class="form-control" 
          placeholder="Enter Train Number" 
        />
      </div>

      <div class="form-group">
        <label>Captcha</label>
        <input [(ngModel)]="captcha" type="text" class="form-control" placeholder="Enter Captcha" />
      </div>
      <div class="captcha-container">
        <div class="captcha-box">EDQ9LC</div>
        <button style="cursor: pointer">
          <img src="assets/refresh.png" alt="" />
        </button>
      </div>

      <div class="checkbox-group">
        <input [(ngModel)]="isChecked" style="cursor: pointer" type="checkbox" id="terms" />
        <label  for="terms" style="cursor: pointer">
          I have read cancellation/boarding point change procedure and its rule. </label
        >
        <a href="#procedure-section" style="color: #4456cb; text-decoration: underline"> click to read </a>
      </div>

      <div class="form-buttons">
        <button 
        (click)="onSubmit()" 
        [disabled]="!formValid() || !isChecked" 
        class="btn-submit">
        Submit
      </button>
        <button (click)="onReset()" class="btn-reset">Reset</button>
      </div>
    </div>
  </div>

  <div class="sample-ticket">
    <h2 class="form-title">Sample Ticket</h2>
    <img src="assets/sample-ticket.png" alt="Sample Ticket" />
  </div>
</div>
