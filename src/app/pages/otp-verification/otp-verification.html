<div class="otp-container">
  <div class="otp-section">
    <h2 class="form-title">{{translate.translate('otpTitle')}}</h2>
   <div class="otp-border">
    <div class="form-border">
        <div class="form-group">
            <label>{{translate.translate('pnrNumber')}}</label>
            <span class="display-value">{{ticket.pnrNumber}}</span>
        </div>

        <div class="form-group">
        <label>{{translate.translate('trainNumber')}}</label>
            <span class="display-value">{{ticket.trainNumber}}</span>
        </div>

        <div class="form-group">
            <label>{{translate.translate('enterOtp')}}</label>
            <div  style="display: flex; gap: 10px; align-items: center;">
            <input [(ngModel)]="otp" maxlength="6" inputmode="numeric" type="text" class="form-control" placeholder="{{translate.translate('enterOtp')}}" maxlength="6" style="flex: 1;">
            <button (click)="onResend()" class="btn-resend">{{translate.translate('resend')}}</button>
            </div>
        </div>

        <div class="otp-message">
            <p>{{translate.translate('otpMessage')}}<strong> ******0466</strong></p>
        </div>

        <div class="form-buttons">
            <button [disabled]="!formValid()" (click)="onSubmit()" class="btn-submit">{{translate.translate('submit')}}</button>
            <button (click)="onBack()" class="btn-reset">{{translate.translate('back')}}</button>
        </div>
        </div>
   </div>

  </div>



  <div class="sample-ticket">
    <h2 class="form-title">Sample Ticket</h2>
    <img src="assets/sample-ticket.png" alt="Sample Ticket" />
  </div>
</div>
