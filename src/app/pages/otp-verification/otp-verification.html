<div class="otp-container">
  <div class="otp-section">
    <h2 class="form-title">Counter Ticket Cancellation</h2>
   <div class="otp-border">
    <div class="form-border">
        <div class="form-group">
            <label>PNR Number</label>
            <span class="display-value">{{ticket.pnrNumber}}</span>
        </div>

        <div class="form-group">
            <label>Train Number</label>
            <span class="display-value">{{ticket.trainNumber}}</span>
        </div>

        <div class="form-group">
            <label>Enter OTP</label>
            <div  style="display: flex; gap: 10px; align-items: center;">
            <input [(ngModel)]="otp" maxlength="6" inputmode="numeric" type="text" class="form-control" placeholder="Enter OTP" maxlength="6" style="flex: 1;">
            <button (click)="onResend()" class="btn-resend">Resend</button>
            </div>
        </div>

        <div class="otp-message">
            <p>OTP has been send on mobile number <strong>******0466</strong></p>
        </div>

        <div class="form-buttons">
            <button [disabled]="!formValid()" (click)="onSubmit()" class="btn-submit">Submit</button>
            <button (click)="onBack()" class="btn-reset">Back</button>
        </div>
        </div>
   </div> 
    
  </div>



  <div class="sample-ticket">
    <h2 class="form-title">Sample Ticket</h2>
    <img src="assets/sample-ticket.png" alt="Sample Ticket" />
  </div>
</div>
